<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="hsl(45, 100%, 72%)">
  <title>Share a testimonial — Ruben Jimenez</title>
  <link rel="shortcut icon" href="./assets/images/logo.jpg" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css?v=testimonial-brand-20260514">
  <script>
    (function () {
      var saved = localStorage.getItem('portfolio-theme');
      if (saved === 'light' || saved === 'dark') {
        document.documentElement.setAttribute('data-theme', saved);
      }
    })();
  </script>
</head>
<body class="testimonial-standalone-body">

  <div class="testimonial-standalone-shell">
    <div class="testimonial-standalone-top">
      <a class="testimonial-standalone-brand" href="./" id="testimonial-brand-link">
        <img id="testimonial-brand-img" src="./assets/images/logo.svg" width="42" height="42" alt="Ruben Jimenez">
        <span>Ruben Jimenez</span>
      </a>
      <a href="./" class="btn btn-secondary" style="min-height: 44px;">Portfolio home</a>
    </div>

    <h1 class="h2 testimonial-standalone-page-title">Share your testimonial</h1>
    <p class="testimonial-standalone-lead" id="testimonial-lead">Loading…</p>

    <div id="testimonial-state-loading" class="testimonial-standalone-card" hidden>
      <p style="margin:0;color:var(--light-gray-70);">Checking your invite link…</p>
    </div>

    <div id="testimonial-state-error" class="testimonial-standalone-card" hidden>
      <p id="testimonial-error-text" style="margin:0;color:var(--light-gray);"></p>
      <p style="margin-top:16px;margin-bottom:0;">
        <a href="./" class="testimonial-standalone-text-link">Back to portfolio</a>
      </p>
    </div>

    <form id="testimonial-form" class="testimonial-standalone-card" hidden novalidate>
      <div class="form-field">
        <label class="form-label" for="t-name">Your name</label>
        <input class="form-input" type="text" id="t-name" name="name" required maxlength="120" autocomplete="name">
      </div>
      <div class="form-field">
        <label class="form-label" for="t-title">Job title</label>
        <input class="form-input" type="text" id="t-title" name="title" required maxlength="120" autocomplete="organization-title">
      </div>
      <div class="form-field">
        <label class="form-label" for="t-company">Company</label>
        <input class="form-input" type="text" id="t-company" name="company" required maxlength="160" autocomplete="organization">
      </div>
      <div class="form-field">
        <label class="form-label" for="t-product">Product you use</label>
        <input class="form-input" type="text" id="t-product" name="product" required maxlength="200" readonly>
      </div>

      <div class="form-field">
        <span class="form-label" id="t-rating-legend">Rating</span>
        <input type="hidden" id="t-rating" name="rating" value="" required>
        <div class="testimonial-stars" id="t-stars" role="radiogroup" aria-labelledby="t-rating-legend" data-rating="0" aria-label="Star rating">
          <button type="button" class="testimonial-star-btn" data-star="1" aria-label="1 star out of 5" title="1 star">&#9733;</button>
          <button type="button" class="testimonial-star-btn" data-star="2" aria-label="2 stars out of 5" title="2 stars">&#9733;</button>
          <button type="button" class="testimonial-star-btn" data-star="3" aria-label="3 stars out of 5" title="3 stars">&#9733;</button>
          <button type="button" class="testimonial-star-btn" data-star="4" aria-label="4 stars out of 5" title="4 stars">&#9733;</button>
          <button type="button" class="testimonial-star-btn" data-star="5" aria-label="5 stars out of 5" title="5 stars">&#9733;</button>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label" for="t-text">Your testimonial</label>
        <textarea class="form-input" id="t-text" name="text" required rows="5" maxlength="5000" placeholder="What worked well? Would you recommend it?"></textarea>
      </div>

      <button type="submit" class="btn btn-primary" id="t-submit" style="margin-top:4px;">Submit testimonial</button>
      <p class="testimonial-standalone-error" id="t-form-error" hidden></p>
    </form>

    <div id="testimonial-state-thanks" class="testimonial-standalone-card" hidden>
      <div class="testimonial-success-icon" aria-hidden="true">&#10003;</div>
      <h2 class="h3" style="margin:0 0 10px;">Thank you!</h2>
      <p class="testimonial-standalone-lead" style="margin-bottom:0;">
        Your testimonial has been published. Ruben appreciates you taking the time.
      </p>
      <p style="margin-top:20px;margin-bottom:0;">
        <a href="./" class="testimonial-standalone-text-link">Back to portfolio</a>
      </p>
    </div>
  </div>

  <script src="./assets/js/config.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import {
      getFirestore,
      doc,
      getDoc,
      collection,
      runTransaction,
      serverTimestamp,
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    function show(el, on) {
      if (!el) return;
      el.hidden = !on;
    }

    const lead = document.getElementById('testimonial-lead');
    const stateLoading = document.getElementById('testimonial-state-loading');
    const stateError = document.getElementById('testimonial-state-error');
    const errorText = document.getElementById('testimonial-error-text');
    const form = document.getElementById('testimonial-form');
    const stateThanks = document.getElementById('testimonial-state-thanks');
    const formError = document.getElementById('t-form-error');
    const submitBtn = document.getElementById('t-submit');
    const ratingInput = document.getElementById('t-rating');
    const starsEl = document.getElementById('t-stars');
    const brandImg = document.getElementById('testimonial-brand-img');

    var logoSrc =
      (typeof window.TESTIMONIAL_BRAND_LOGO === 'string' && window.TESTIMONIAL_BRAND_LOGO.trim()) ||
      './assets/images/logo.svg';
    if (brandImg) {
      brandImg.src = logoSrc;
      brandImg.alt = 'Ruben Jimenez';
    }

    const params = new URLSearchParams(window.location.search);
    const tokenId = (params.get('token') || '').trim();

    if (starsEl && ratingInput) {
      starsEl.querySelectorAll('.testimonial-star-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var n = parseInt(btn.getAttribute('data-star'), 10);
          if (n < 1 || n > 5) return;
          ratingInput.value = String(n);
          starsEl.setAttribute('data-rating', String(n));
        });
      });
    }

    function showError(msg) {
      show(stateLoading, false);
      show(form, false);
      show(stateThanks, false);
      errorText.textContent = msg;
      show(stateError, true);
      lead.textContent = 'This link is not valid or has expired.';
    }

    function showForm(prefill) {
      show(stateLoading, false);
      show(stateError, false);
      show(stateThanks, false);
      document.getElementById('t-name').value = prefill.name || '';
      document.getElementById('t-product').value = prefill.product || '';
      lead.textContent =
        'You were invited to share feedback about ' +
        (prefill.product ? '"' + prefill.product + '"' : 'Ruben\'s work') +
        '. Fields from your invite are pre-filled; you can edit your name.';
      show(form, true);
    }

    async function main() {
      show(stateLoading, true);
      lead.textContent = 'Checking your invite…';

      if (!tokenId || tokenId.length < 32) {
        showError('Missing or invalid link. Open the full URL from your email.');
        return;
      }

      const cfg = window.FIREBASE_CONFIG;
      if (!cfg) {
        showError('Configuration error. Please try again later.');
        return;
      }

      const app = initializeApp(cfg);
      const db = getFirestore(app);
      const tokenRef = doc(db, 'testimonialTokens', tokenId);
      const snap = await getDoc(tokenRef);

      show(stateLoading, false);

      if (!snap.exists()) {
        showError('We could not find this invite. It may have been mistyped or removed.');
        return;
      }

      const data = snap.data();
      if (data.used === true) {
        showError('This invite link was already used. Thank you — if you need to change something, contact Ruben directly.');
        return;
      }

      showForm({ name: data.name || '', product: data.product || '' });

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        formError.hidden = true;
        const name = document.getElementById('t-name').value.trim();
        const title = document.getElementById('t-title').value.trim();
        const company = document.getElementById('t-company').value.trim();
        const product = document.getElementById('t-product').value.trim();
        const text = document.getElementById('t-text').value.trim();
        const rating = parseInt(ratingInput && ratingInput.value ? ratingInput.value : '', 10);

        if (!name || !title || !company || !product || !text) {
          formError.textContent = 'Please fill in all fields.';
          formError.hidden = false;
          return;
        }
        if (rating < 1 || rating > 5) {
          formError.textContent = 'Please choose a star rating.';
          formError.hidden = false;
          return;
        }

        var payload = {
          name: name,
          title: title,
          company: company,
          product: product,
          text: text,
          rating: rating,
          token: tokenId,
          createdAt: serverTimestamp(),
          avatar: 'avatar-1.png',
        };

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting…';

        try {
          await runTransaction(db, async function (transaction) {
            const tSnap = await transaction.get(tokenRef);
            if (!tSnap.exists()) {
              throw new Error('INVITE_GONE');
            }
            const tData = tSnap.data();
            if (tData.used === true) {
              throw new Error('ALREADY_USED');
            }
            const newRef = doc(collection(db, 'testimonials'));
            transaction.set(newRef, payload);
            transaction.update(tokenRef, { used: true });
          });

          show(form, false);
          show(stateThanks, true);
          lead.textContent = 'All set!';
        } catch (err) {
          console.error(err);
          if (err && err.message === 'ALREADY_USED') {
            formError.textContent = 'This link was just used. Refresh the page if you already submitted.';
          } else if (err && err.message === 'INVITE_GONE') {
            formError.textContent = 'This invite is no longer available.';
          } else {
            formError.textContent =
              err && err.code === 'permission-denied'
                ? 'Permission denied. Deploy updated Firestore rules and try again.'
                : 'Something went wrong. Please try again in a moment.';
          }
          formError.hidden = false;
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Submit testimonial';
        }
      });
    }

    main().catch(function (err) {
      console.error(err);
      show(stateLoading, false);
      showError('Could not load this page. Check your connection and try again.');
    });
  </script>
</body>
</html>
